<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script src="firebase.js"></script>
</head>
<body>

<div class="phone">
  <h2>📝 Register</h2>

  <div class="role-select">
    <button onclick="setRole('commuter')">🚶 Commuter</button>
    <button onclick="setRole('driver')">🛺 Driver</button>
  </div>

  <p id="roleText">Select role</p>

  <input type="text" id="name" placeholder="Full Name" />
  <input type="email" id="email" placeholder="Email" />
  <input type="password" id="password" placeholder="Password" />

  <!-- DRIVER ONLY -->
  <input
    type="text"
    id="plateNumber"
    placeholder="Motorcycle Plate Number"
    style="display:none;"
  />

  <select id="idType">
    <option value="">Select ID Type</option>
    <option value="national_id">National ID</option>
    <option value="drivers_license">Driver's License</option>
    <option value="passport">Passport</option>
    <option value="school_id">School ID</option>
  </select>

  <input type="file" id="idFile" accept="image/*" />

  <p style="font-size:12px; opacity:0.8;">
    Upload a clear photo of your valid ID
  </p>

  <button class="login-btn" onclick="register()">Create Account</button>

  <p style="margin-top:15px;">
    Already have an account?
    <a href="index.html" style="color:#b084ff;">Login</a>
  </p>
</div>

<script src="register.js"></script>
</body>
</html>
